<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RRC Portfolio | Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Fraunces:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0e17;
            --bg-card: #1a2234;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent-gold: #d4a853;
            --accent-rose: #f43f5e;
            --border-color: rgba(148, 163, 184, 0.1);
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                radial-gradient(ellipse 80% 50% at 50% -20%, rgba(212, 168, 83, 0.08), transparent),
                radial-gradient(ellipse 60% 40% at 100% 100%, rgba(56, 189, 248, 0.05), transparent);
            pointer-events: none;
        }
        
        .login-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }
        
        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 40px;
            text-align: center;
        }
        
        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 32px;
        }
        
        .logo-icon {
            width: 40px;
            height: 40px;
            color: var(--accent-gold);
        }
        
        .logo-text {
            font-family: 'Fraunces', serif;
            font-size: 1.5rem;
            font-weight: 500;
        }
        
        h1 {
            font-family: 'Fraunces', serif;
            font-size: 1.25rem;
            font-weight: 500;
            margin-bottom: 8px;
        }
        
        .subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 32px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        input[type="password"] {
            width: 100%;
            padding: 14px 18px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 1rem;
            text-align: center;
            letter-spacing: 0.1em;
        }
        
        input[type="password"]:focus {
            outline: none;
            border-color: var(--accent-gold);
        }
        
        input[type="password"]::placeholder {
            color: var(--text-muted);
            letter-spacing: normal;
        }
        
        .btn {
            width: 100%;
            padding: 14px 24px;
            background: var(--accent-gold);
            color: var(--bg-primary);
            border: none;
            border-radius: 8px;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        
        .btn:hover { opacity: 0.9; }
        
        .error {
            color: var(--accent-rose);
            font-size: 0.85rem;
            margin-top: 16px;
            display: none;
        }
        
        .error.show { display: block; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <div class="logo-icon">
                    <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect x="4" y="12" width="6" height="16" rx="1" fill="currentColor" opacity="0.6"/>
                        <rect x="13" y="6" width="6" height="22" rx="1" fill="currentColor" opacity="0.8"/>
                        <rect x="22" y="2" width="6" height="26" rx="1" fill="currentColor"/>
                    </svg>
                </div>
                <span class="logo-text">Red River Corp</span>
            </div>
            
            <h1>Portfolio Dashboard</h1>
            <p class="subtitle">Enter the access password to continue</p>
            
            <form id="loginForm">
                <div class="form-group">
                    <input type="password" id="password" placeholder="Password" autocomplete="current-password" required>
                </div>
                <button type="submit" class="btn">Access Dashboard</button>
            </form>
            
            <p id="error" class="error">Incorrect password. Please try again.</p>
        </div>
    </div>
    
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('error');
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });
                
                if (response.ok) {
                    window.location.href = '/';
                } else {
                    errorEl.classList.add('show');
                    document.getElementById('password').value = '';
                }
            } catch (err) {
                errorEl.textContent = 'Connection error. Please try again.';
                errorEl.classList.add('show');
            }
        });
    </script>
</body>
</html>
